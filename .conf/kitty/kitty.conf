# =============================================================================
# Font
# =============================================================================

font_size 10.0
# font_family      JetBrains Mono   # descomenta si instalas una Nerd Font
# bold_font        auto
# italic_font      auto
# bold_italic_font auto

# =============================================================================
# Layout / Padding
# =============================================================================

window_padding_width 4
placement_strategy center

# =============================================================================
# Apariencia
# =============================================================================

background_opacity 0.85
dynamic_background_opacity yes      # ctrl+shift+a m/l para subir/bajar opacidad

cursor_shape          beam
#cursor_blink_interval 0             # sin parpadeo

# =============================================================================
# Tab bar
# =============================================================================

tab_bar_style        powerline
tab_powerline_style  slanted
tab_bar_edge         bottom
tab_title_template   "{index}: {title[:20]}"

# =============================================================================
# Scrollback
# =============================================================================

scrollback_lines      10000
scrollback_pager_history_size 0

# =============================================================================
# URLs
# =============================================================================

url_style            curly
open_url_with        default
detect_urls          yes

# =============================================================================
# Clipboard / selección
# =============================================================================

copy_on_select       yes
paste_actions        quote-urls-at-prompt

# =============================================================================
# Bell
# =============================================================================

enable_audio_bell    no
visual_bell_duration 0.0

# =============================================================================
# Shell integration (autocompletado OSC, marks, etc.)
# =============================================================================

shell                /usr/bin/zsh
shell_integration    enabled

# =============================================================================
# Rendimiento
# =============================================================================

repaint_delay  8
input_delay    3
sync_to_monitor yes

# =============================================================================
# Ventana
# =============================================================================

confirm_os_window_close  0
remember_window_size     yes
hide_window_decorations  no

# =============================================================================
# Atajos útiles para desarrollo
# =============================================================================

# Abrir nueva ventana en el mismo directorio
map ctrl+shift+enter new_window_with_cwd

# Nueva pestaña en el mismo directorio
map ctrl+shift+t     new_tab_with_cwd

# Aumentar / reducir fuente rápido
map ctrl+equal       change_font_size all +1.0
map ctrl+minus       change_font_size all -1.0
map ctrl+0           change_font_size all 0

# Limpiar pantalla y scrollback
map ctrl+shift+k     combine : clear_terminal scrollback active : send_text normal \x0c

# Scroll rápido
map ctrl+shift+u     scroll_page_up
map ctrl+shift+d     scroll_page_down

# Modo pantalla completa
map f11              toggle_fullscreen

# =============================================================================
# Tema (auto-generado por `kitten themes`)
# =============================================================================

include dark-theme.auto.conf
